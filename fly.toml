# Fly.io configuration for Remix Frontend staging
# Deploy: fly deploy

app = "confadium-fe"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_API_BASE_URL = "https://confadium.fly.dev/api/v1"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = 15000
    grace_period = "5s"
    method = "GET"
    path = "/"
    protocol = "http"
    timeout = 5000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
